# Control Panel Application Configuration
# ========================================
# Define Python tools and Dash applications to manage
#
# NOTE: This is a distribution copy. Paths are relative to BASE_DIR, which
# is set in controlpanel_app.py or via CONTROL_PANEL_APPS_DIR env var.
# Default: points to GUI_and_components folder in the main workspace.

python_tools:
  ### notebook that scans all data and generates invioice for unpaid
  ## check GIU and components for invoice generation notebook and add here if needed
  - #id: invoice-generation
    #name: Invoice Generator
    #path: invoice_generation/Invoice_generator.ipynb
    #type: notebook
    #description: Generate invoices (Jupyter Notebook)

  - id: kb-flow-analysis
    name: KanbanFlow Hours Analysis
    path: finance_tracker/KB_Flow_analysis.ipynb
    type: notebook
    description: Direct API pull of KanbanFlow hours → SQLite → Dash dashboard / Google Sheets sync

dash_apps:
  - id: phoenix-arize
    name: Phoenix/Arize Traces
    path: phoenix_arize/app.py
    port: 6006
    description: Local OpenTelemetry trace collection and visualization via Phoenix/Arize
    reverse_proxy:
      env_prefix: PHOENIX_ARIZE
      remote_port: 19006

  - id: learning-platform
    name: Learning Platform
    path: learning_platform/app.py
    port: 8050
    description: Educational platform with courses and materials
    reverse_proxy:
      env_prefix: LEARNING_PLATFORM
      remote_port: 19050

  - id: ollama-llm
    name: ollama-llm Frontend
    path: ollama_llm/app.py
    port: 11434
    description: Ollama LLM Frontend
    reverse_proxy:
      env_prefix: OLLAMA_LLM
      remote_port: 19053

  - id: ollama-chat
    name: Ollama Chat UI
    path: ollama_llm/ollama_chat_app.py
    port: 11500
    description: Chat interface for Ollama with OpenTelemetry tracing to Phoenix
    reverse_proxy:
      env_prefix: OLLAMA_CHAT
      remote_port: 19054

# Panel Grouping - Controls which tab each tool/app appears in.
# Each panel must have explicit tool_ids and dash_ids lists.
# Ordering within each list determines card render order.
panel_groups:
  llm:
    label: "🧠 LLM PANEL"
    tab_id: llm-panel
    tool_ids: []
    dash_ids:
      - phoenix-arize
      - ollama-llm
      - ollama-chat
    project_name: default

  Developer:
    label: "🗂️ Developer TOOLS"
    tab_id: daily-panel
    tool_ids: []
    dash_ids:
      - daily-use-aggregator
      - learning-platform
  manager:
    label: "📋 MANAGER TOOLS"
    tab_id: manager-panel
    tool_ids: []
    dash_ids:


# App Skins - Define visual themes for different personas.
# css_class: the CSS class applied to .persona-wrapper when this skin is active.
#            Must match a .persona-wrapper.<css_class> rule in assets/custom.css.
skins:
  default:
    css_class: persona-admin
    name: Default Theme
    colors:
      primary: "#007bff"
      secondary: "#6c757d"
      background: "#ffffff"
      surface: "#f8f9fa"
      text: "#212529"
      border: "#dee2e6"
    font_family: "Arial, sans-serif"

  dark:
    css_class: persona-developer
    name: Dark Theme
    colors:
      primary: "#0d6efd"
      secondary: "#6c757d"
      background: "#1a1a1a"
      surface: "#2d2d2d"
      text: "#f8f9fa"
      border: "#404040"
    font_family: "Arial, sans-serif"

# User Personas - Define which apps each user type can access
personas:
  admin:
    name: Administrator
    skin: default
    allowed_tools:
      - invoice-generation
      - kb-flow-analysis
    allowed_dash_apps:
      - phoenix-arize
      - finance-tracker
      - invoice-parser
      - dash-cards
      - ollama-llm
      - ollama-chat
      - invoice-tool

  developer:
    name: Developer
    skin: dark
    allowed_tools: []
    allowed_dash_apps:
      - phoenix-arize
      - invoice-parser
      - ollama-llm
      - ollama-chat
      - learning-platform

  management:
    name: Management
    skin: management
    description: Operations & reporting overview
    allowed_tools:
      - invoice-generation
    allowed_dash_apps:
      - phoenix-arize
      - finance-tracker
      - invoice-parser
      - ollama-llm
      - ollama-chat
      - invoice-tool
      - daily-use-aggregator
